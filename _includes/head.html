<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="{{ site.description }}">
  <!-- Open Graph meta tags -->
  <meta property="og:title" content="{{ page.title | escape }}" />
  <meta property="og:description" content="{{ page.excerpt | strip_html | strip_newlines | escape }}" />
  <meta property="og:type" content="article" />
  <meta property="og:url" content="{{ page.url | absolute_url }}" />
  <meta property="og:image" content="https://pbs.twimg.com/profile_images/1876393154099740672/7iLAPmhD_400x400.jpg" />

  <title>
    {% if page.title == "Home" %}
    {{ site.title }}
    {% else %}
    {{ page.title }} &middot; {{ site.title }}
    {% endif %}
  </title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

  <script src="https://cdn.tailwindcss.com?plugins=typography"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            'frost': {
              50: '#f8fafc',
              100: '#f1f5f9',
              200: '#e2e8f0',
              300: '#cbd5e1',
              400: '#94a3b8',
              500: '#64748b',
              600: '#475569',
              700: '#334155',
              800: '#1e293b',
              900: '#0f172a',
              950: '#020617',
            },
            'accent': '#0ea5e9',
          },
          fontFamily: {
            'serif': ['"Inter"', 'system-ui', 'sans-serif'],
            'sans': ['"DM Sans"', 'system-ui', 'sans-serif'],
            'mono': ['"JetBrains Mono"', 'monospace'],
          },
        }
      }
    }
  </script>
  <style>
    /* Crisp text rendering */
    body {
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      text-rendering: optimizeLegibility;
    }
    
    /* Card effect */
    .frost-card {
      background: linear-gradient(135deg, 
        rgba(255, 255, 255, 0.95) 0%, 
        rgba(241, 245, 249, 0.9) 100%);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255, 255, 255, 0.8);
      box-shadow: 
        0 4px 6px -1px rgba(0, 0, 0, 0.05),
        0 2px 4px -2px rgba(0, 0, 0, 0.05),
        inset 0 1px 0 rgba(255, 255, 255, 0.6);
    }
    
    .frost-card:hover {
      box-shadow: 
        0 10px 15px -3px rgba(0, 0, 0, 0.08),
        0 4px 6px -4px rgba(0, 0, 0, 0.05),
        inset 0 1px 0 rgba(255, 255, 255, 0.8);
    }

    /* Quote styling */
    .prose blockquote {
      position: relative;
      padding-left: 1.5rem;
      border-left: none !important;
    }
    
    .prose blockquote::before {
      content: '';
      position: absolute;
      left: 0;
      top: 0;
      bottom: 0;
      width: 3px;
      background: linear-gradient(180deg, #0ea5e9 0%, #38bdf8 50%, #0ea5e9 100%);
      border-radius: 2px;
    }
    
    /* Code block styling - readable syntax highlighting */
    .prose pre {
      background: #1e293b !important;
      border: 1px solid rgba(148, 163, 184, 0.2);
      border-radius: 0.75rem;
    }
    
    .prose pre code {
      color: #e2e8f0 !important;
    }
    
    .prose code {
      color: #0ea5e9 !important;
    }

    /* Smooth transitions */
    a, button {
      transition: color 0.2s ease, background-color 0.2s ease, border-color 0.2s ease, box-shadow 0.3s ease;
    }
  </style>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css"
    integrity="sha512-Evv84Mr4kqVGRNSgIGL/F/aIDqB7xQ2vcrdIwxfjThSH8CSR7PBEakCr51Ck+w+/U6swU2Im1vVX0SVk9ABhg=="
    crossorigin="anonymous" referrerpolicy="no-referrer" />
  {% feed_meta %}
</head>
