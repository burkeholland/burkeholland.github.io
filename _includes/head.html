<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="description" content="{{ site.description }}">
  <!-- Open Graph meta tags -->
  <meta property="og:title" content="{{ page.title | escape }}" />
  <meta property="og:description" content="{{ page.excerpt | strip_html | strip_newlines | escape }}" />
  <meta property="og:type" content="article" />
  <meta property="og:url" content="{{ page.url | absolute_url }}" />
  <meta property="og:image" content="https://pbs.twimg.com/profile_images/1876393154099740672/7iLAPmhD_400x400.jpg" />

  <title>
    {% if page.title == "Home" %}
    {{ site.title }}
    {% else %}
    {{ page.title }} &middot; {{ site.title }}
    {% endif %}
  </title>

  <script src="https://cdn.tailwindcss.com?plugins=typography,aspect-ratio"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            'neon-pink': '#F06BF2',
            'deep-purple': '#532473',
            'bright-purple': '#7630D9',
            'deep-blue': '#04588C',
            'neon-cyan': '#79F2E6',
          },
          width: {
            'sidebar': '300px'
          },
          typography: {
            invert: {
              css: {
                '--tw-prose-body': 'rgba(255, 255, 255, 0.9)',
                '--tw-prose-headings': 'var(--neon-cyan)',
                '--tw-prose-links': 'var(--neon-cyan)',
                '--tw-prose-code': 'var(--neon-cyan)',
                '--tw-prose-quotes': 'rgba(255, 255, 255, 0.7)',
              }
            }
          }
        }
      }
    }
  </script>
  <style type="text/tailwindcss">
    @layer utilities {
      .backdrop-blur { backdrop-filter: blur(10px); }
    }
    @layer base {
      body {
        @apply overflow-x-hidden;
      }
    }
  </style>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css"
    integrity="sha512-Evv84Mr4kqVGRNSgIGL/F/aIDqB7xQ2vcrdIwxfjThSH8CSR7PBEakCr51Ck+w+/U6swU2Im1vVX0SVk9ABhg=="
    crossorigin="anonymous" referrerpolicy="no-referrer" />
  {% feed_meta %}
</head>
