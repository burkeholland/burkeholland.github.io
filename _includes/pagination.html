<nav class="flex justify-between mt-8 gap-4" role="navigation" aria-label="pagination">
    {% if paginator.previous_page %}
    <a href="{{ paginator.next_page_path }}"
        class="px-4 py-2 bg-white/10 border border-white/10 rounded-lg text-neon-cyan hover:bg-neon-pink hover:text-white transition-colors">&larr;
        Previos</a>
    {% else %}
    <span class="px-4 py-2 bg-white/10 border border-white/10 rounded-lg opacity-50 cursor-not-allowed">&larr;
        Previous</span>
    {% endif %}

    {% if paginator.next_page %}
    <a href="{{ paginator.next_page_path }}"
        class="px-4 py-2 bg-white/10 border border-white/10 rounded-lg text-neon-cyan hover:bg-neon-pink hover:text-white transition-colors">Next
        &rarr;</a>
    {% else %}
    <span class="px-4 py-2 bg-white/10 border border-white/10 rounded-lg opacity-50 cursor-not-allowed">Next
        &rarr;</span>
    {% endif %}
</nav>
