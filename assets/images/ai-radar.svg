<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 1000" width="1000" height="1000">
  <defs>
    <!-- Blur filters for watercolor effect -->
    <filter id="blur-soft">
      <feGaussianBlur in="SourceGraphic" stdDeviation="8"/>
    </filter>
    <filter id="blur-edge">
      <feGaussianBlur in="SourceGraphic" stdDeviation="3"/>
    </filter>
    
    <style>
      .title { 
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
        font-size: 22px;
        font-weight: 400;
        fill: #999999;
        opacity: 0.5;
      }
      .axis-label { 
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
        font-size: 14px;
        fill: #cccccc;
        text-anchor: middle;
        opacity: 0.4;
      }
      .legend-text { 
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
        font-size: 13px;
        fill: #999999;
        opacity: 0.6;
      }
      .grid-circle {
        fill: none;
        stroke: #e8e8e8;
        stroke-width: 0.8;
        opacity: 0.3;
      }
      .axis-line {
        stroke: #e8e8e8;
        stroke-width: 0.4;
        opacity: 0.25;
      }
      .theoretical-fill {
        fill: rgba(80, 140, 220, 0.35);
        stroke: rgba(80, 140, 220, 0.5);
        stroke-width: 1.5;
        filter: url(#blur-soft);
      }
      .observed-fill {
        fill: rgba(220, 80, 70, 0.4);
        stroke: rgba(220, 80, 70, 0.5);
        stroke-width: 1.5;
        filter: url(#blur-soft);
      }
      .theoretical-dot {
        fill: rgba(80, 140, 220, 0.6);
        opacity: 0.4;
      }
      .observed-dot {
        fill: rgba(220, 80, 70, 0.6);
        opacity: 0.4;
      }
    </style>
  </defs>
  
  <!-- Background -->
  <rect width="1000" height="1000" fill="#fafafa"/>
  
  <!-- Title -->
  <text x="500" y="60" class="title" text-anchor="middle">
    Theoretical capability and observed usage by occupational category
  </text>
  
  <g transform="translate(500, 500)">
    <!-- Grid circles (0.4, 0.6, 0.8, 1.0 scale, radius 280) -->
    <circle cx="0" cy="0" r="112" class="grid-circle"/>
    <circle cx="0" cy="0" r="168" class="grid-circle"/>
    <circle cx="0" cy="0" r="224" class="grid-circle"/>
    <circle cx="0" cy="0" r="280" class="grid-circle"/>
    
    <!-- 22 axis lines radiating from center -->
    <!-- Management (0°) -->
    <line x1="0" y1="0" x2="0" y2="-280" class="axis-line"/>
    <!-- Business & finance (16.36°) -->
    <line x1="0" y1="0" x2="78.86" y2="-269.67" class="axis-line"/>
    <!-- Computer & math (32.73°) -->
    <line x1="0" y1="0" x2="151.45" y2="-236.56" class="axis-line"/>
    <!-- Architecture & engineering (49.09°) -->
    <line x1="0" y1="0" x2="211.54" y2="-183.04" class="axis-line"/>
    <!-- Life & social sciences (65.45°) -->
    <line x1="0" y1="0" x2="254.71" y2="-115.88" class="axis-line"/>
    <!-- Social services (81.82°) -->
    <line x1="0" y1="0" x2="278.17" y2="-39.88" class="axis-line"/>
    <!-- Legal (98.18°) -->
    <line x1="0" y1="0" x2="277.16" y2="39.88" class="axis-line"/>
    <!-- Education & library (114.55°) -->
    <line x1="0" y1="0" x2="253.22" y2="115.88" class="axis-line"/>
    <!-- Arts & media (130.91°) -->
    <line x1="0" y1="0" x2="210.07" y2="183.04" class="axis-line"/>
    <!-- Healthcare practitioners (147.27°) -->
    <line x1="0" y1="0" x2="150.08" y2="236.56" class="axis-line"/>
    <!-- Healthcare support (163.64°) -->
    <line x1="0" y1="0" x2="77.57" y2="269.67" class="axis-line"/>
    <!-- Protective service (180°) -->
    <line x1="0" y1="0" x2="0" y2="280" class="axis-line"/>
    <!-- Food & serving (196.36°) -->
    <line x1="0" y1="0" x2="-78.86" y2="269.67" class="axis-line"/>
    <!-- Grounds maintenance (212.73°) -->
    <line x1="0" y1="0" x2="-151.45" y2="236.56" class="axis-line"/>
    <!-- Personal care (229.09°) -->
    <line x1="0" y1="0" x2="-211.54" y2="183.04" class="axis-line"/>
    <!-- Sales (245.45°) -->
    <line x1="0" y1="0" x2="-254.71" y2="115.88" class="axis-line"/>
    <!-- Office & admin (261.82°) -->
    <line x1="0" y1="0" x2="-278.17" y2="39.88" class="axis-line"/>
    <!-- Agriculture (278.18°) -->
    <line x1="0" y1="0" x2="-277.16" y2="-39.88" class="axis-line"/>
    <!-- Construction (294.55°) -->
    <line x1="0" y1="0" x2="-253.22" y2="-115.88" class="axis-line"/>
    <!-- Installation & repair (310.91°) -->
    <line x1="0" y1="0" x2="-210.07" y2="-183.04" class="axis-line"/>
    <!-- Production (327.27°) -->
    <line x1="0" y1="0" x2="-150.08" y2="-236.56" class="axis-line"/>
    <!-- Transportation (343.64°) -->
    <line x1="0" y1="0" x2="-77.57" y2="-269.67" class="axis-line"/>
    
    <!-- Theoretical AI coverage polygon (blue) - wobbly/imprecise version -->
    <polygon points="3,-215 48,-178 135,-205 142,-115 145,-68 108,-18 255,40 168,78 162,142 58,98 24,99 -2,88 -28,85 -48,74 -78,68 -145,62 -270,42 -88,-15 -68,-32 -67,-50 -48,-75 -26,-85" class="theoretical-fill"/>
    
    <!-- Observed AI coverage polygon (red) - wobbly/imprecise version -->
    <polygon points="-2,-45 28,-112 48,-74 35,-30 45,-20 25,10 58,26 40,40 35,58 18,75 8,98 2,28 -15,44 -26,38 -35,30 -42,20 -74,12 -20,-10 -18,-20 -24,-32 -26,-50 -15,-58" class="observed-fill"/>
    
    <!-- Theoretical dots (blue) -->
    <circle cx="0" cy="-210" r="4.5" class="theoretical-dot"/>
    <circle cx="51.15" cy="-174.77" r="4.5" class="theoretical-dot"/>
    <circle cx="128.73" cy="-201.08" r="4.5" class="theoretical-dot"/>
    <circle cx="137.50" cy="-118.98" r="4.5" class="theoretical-dot"/>
    <circle cx="140.09" cy="-63.73" r="4.5" class="theoretical-dot"/>
    <circle cx="111.27" cy="-15.95" r="4.5" class="theoretical-dot"/>
    <circle cx="249.44" cy="35.91" r="4.5" class="theoretical-dot"/>
    <circle cx="164.59" cy="75.32" r="4.5" class="theoretical-dot"/>
    <circle cx="157.55" cy="137.28" r="4.5" class="theoretical-dot"/>
    <circle cx="60.03" cy="94.62" r="4.5" class="theoretical-dot"/>
    <circle cx="27.14" cy="94.38" r="4.5" class="theoretical-dot"/>
    <circle cx="0" cy="84" r="4.5" class="theoretical-dot"/>
    <circle cx="-23.66" cy="80.90" r="4.5" class="theoretical-dot"/>
    <circle cx="-45.44" cy="71.00" r="4.5" class="theoretical-dot"/>
    <circle cx="-74.04" cy="64.16" r="4.5" class="theoretical-dot"/>
    <circle cx="-140.09" cy="63.73" r="4.5" class="theoretical-dot"/>
    <circle cx="-264.25" cy="37.89" r="4.5" class="theoretical-dot"/>
    <circle cx="-83.15" cy="-11.96" r="4.5" class="theoretical-dot"/>
    <circle cx="-63.33" cy="-29.02" r="4.5" class="theoretical-dot"/>
    <circle cx="-63.03" cy="-45.77" r="4.5" class="theoretical-dot"/>
    <circle cx="-45.02" cy="-70.93" r="4.5" class="theoretical-dot"/>
    <circle cx="-23.27" cy="-80.90" r="4.5" class="theoretical-dot"/>
    
    <!-- Observed dots (red) -->
    <circle cx="0" cy="-42" r="4.5" class="observed-dot"/>
    <circle cx="31.54" cy="-107.87" r="4.5" class="observed-dot"/>
    <circle cx="45.44" cy="-71.00" r="4.5" class="observed-dot"/>
    <circle cx="32.56" cy="-27.43" r="4.5" class="observed-dot"/>
    <circle cx="42.28" cy="-17.44" r="4.5" class="observed-dot"/>
    <circle cx="22.26" cy="7.97" r="4.5" class="observed-dot"/>
    <circle cx="55.57" cy="23.17" r="4.5" class="observed-dot"/>
    <circle cx="36.97" cy="37.14" r="4.5" class="observed-dot"/>
    <circle cx="31.51" cy="54.91" r="4.5" class="observed-dot"/>
    <circle cx="15.01" cy="70.97" r="4.5" class="observed-dot"/>
    <circle cx="5.43" cy="94.38" r="4.5" class="observed-dot"/>
    <circle cx="0" cy="25.20" r="4.5" class="observed-dot"/>
    <circle cx="-11.83" cy="40.35" r="4.5" class="observed-dot"/>
    <circle cx="-22.72" cy="35.54" r="4.5" class="observed-dot"/>
    <circle cx="-31.77" cy="27.46" r="4.5" class="observed-dot"/>
    <circle cx="-38.24" cy="17.44" r="4.5" class="observed-dot"/>
    <circle cx="-69.55" cy="9.96" r="4.5" class="observed-dot"/>
    <circle cx="-16.63" cy="-7.97" r="4.5" class="observed-dot"/>
    <circle cx="-15.18" cy="-17.44" r="4.5" class="observed-dot"/>
    <circle cx="-21.01" cy="-28.26" r="4.5" class="observed-dot"/>
    <circle cx="-22.51" cy="-47.25" r="4.5" class="observed-dot"/>
    <circle cx="-11.63" cy="-53.93" r="4.5" class="observed-dot"/>
    
    <!-- Axis labels -->
    <text x="0" y="-305" class="axis-label">Management</text>
    <text x="100" y="-300" class="axis-label">Business &amp; finance</text>
    <text x="185" y="-260" class="axis-label">Computer &amp; math</text>
    <text x="265" y="-200" class="axis-label" text-anchor="start">Architecture &amp; engineering</text>
    <text x="300" y="-120" class="axis-label" text-anchor="start">Life &amp; social sciences</text>
    <text x="315" y="-35" class="axis-label" text-anchor="start">Social services</text>
    <text x="315" y="50" class="axis-label" text-anchor="start">Legal</text>
    <text x="300" y="135" class="axis-label" text-anchor="start">Education &amp; library</text>
    <text x="265" y="220" class="axis-label" text-anchor="start">Arts &amp; media</text>
    <text x="185" y="280" class="axis-label" text-anchor="start">Healthcare practitioners</text>
    <text x="100" y="320" class="axis-label">Healthcare support</text>
    <text x="0" y="330" class="axis-label">Protective service</text>
    <text x="-100" y="320" class="axis-label">Food &amp; serving</text>
    <text x="-185" y="280" class="axis-label" text-anchor="end">Grounds maintenance</text>
    <text x="-265" y="220" class="axis-label" text-anchor="end">Personal care</text>
    <text x="-300" y="135" class="axis-label" text-anchor="end">Sales</text>
    <text x="-315" y="50" class="axis-label" text-anchor="end">Office &amp; admin</text>
    <text x="-315" y="-35" class="axis-label" text-anchor="end">Agriculture</text>
    <text x="-300" y="-120" class="axis-label" text-anchor="end">Construction</text>
    <text x="-265" y="-200" class="axis-label" text-anchor="end">Installation &amp; repair</text>
    <text x="-185" y="-260" class="axis-label">Production</text>
    <text x="-100" y="-300" class="axis-label">Transportation</text>
  </g>
  
  <!-- Legend -->
  <g transform="translate(720, 920)">
    <circle cx="0" cy="0" r="5" class="theoretical-dot"/>
    <text x="15" y="5" class="legend-text">Theoretical AI coverage</text>
  </g>
  <g transform="translate(720, 950)">
    <circle cx="0" cy="0" r="5" class="observed-dot"/>
    <text x="15" y="5" class="legend-text">Observed AI coverage</text>
  </g>
</svg>
