<svg width="800" height="600" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="800" height="600" fill="#0a0e1a"/>
  
  <!-- Definitions -->
  <defs>
    <!-- Gradient for current use -->
    <linearGradient id="currentGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:0.6" />
      <stop offset="100%" style="stop-color:#06b6d4;stop-opacity:0.6" />
    </linearGradient>
    
    <!-- Gradient for potential -->
    <linearGradient id="potentialGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f59e0b;stop-opacity:0.3" />
      <stop offset="100%" style="stop-color:#ef4444;stop-opacity:0.3" />
    </linearGradient>
  </defs>
  
  <!-- Title -->
  <text x="400" y="35" font-family="Arial, sans-serif" font-size="20" fill="#e5e7eb" text-anchor="middle" font-weight="bold">
    AI Capability by Task Category
  </text>
  
  <!-- Center point -->
  <g transform="translate(400, 320)">
    <!-- Grid circles -->
    <circle cx="0" cy="0" r="60" fill="none" stroke="#1f2937" stroke-width="1" opacity="0.5"/>
    <circle cx="0" cy="0" r="120" fill="none" stroke="#1f2937" stroke-width="1" opacity="0.5"/>
    <circle cx="0" cy="0" r="180" fill="none" stroke="#1f2937" stroke-width="1" opacity="0.5"/>
    <circle cx="0" cy="0" r="240" fill="none" stroke="#374151" stroke-width="1.5"/>
    
    <!-- Axes - 6 categories at 60° intervals -->
    <!-- Cognitive/Analytical (0°, top) -->
    <line x1="0" y1="0" x2="0" y2="-240" stroke="#374151" stroke-width="1.5"/>
    <text x="0" y="-255" font-family="Arial, sans-serif" font-size="13" fill="#9ca3af" text-anchor="middle" font-weight="500">
      Cognitive/Analytical
    </text>
    
    <!-- Creative (60°, upper right) -->
    <line x1="0" y1="0" x2="207.85" y2="-120" stroke="#374151" stroke-width="1.5"/>
    <text x="225" y="-130" font-family="Arial, sans-serif" font-size="13" fill="#9ca3af" text-anchor="start" font-weight="500">
      Creative
    </text>
    
    <!-- Technical (120°, lower right) -->
    <line x1="0" y1="0" x2="207.85" y2="120" stroke="#374151" stroke-width="1.5"/>
    <text x="225" y="125" font-family="Arial, sans-serif" font-size="13" fill="#9ca3af" text-anchor="start" font-weight="500">
      Technical
    </text>
    
    <!-- Administrative (180°, bottom) -->
    <line x1="0" y1="0" x2="0" y2="240" stroke="#374151" stroke-width="1.5"/>
    <text x="0" y="265" font-family="Arial, sans-serif" font-size="13" fill="#9ca3af" text-anchor="middle" font-weight="500">
      Administrative
    </text>
    
    <!-- Interpersonal/Social (240°, lower left) -->
    <line x1="0" y1="0" x2="-207.85" y2="120" stroke="#374151" stroke-width="1.5"/>
    <text x="-225" y="125" font-family="Arial, sans-serif" font-size="13" fill="#9ca3af" text-anchor="end" font-weight="500">
      Interpersonal/Social
    </text>
    
    <!-- Physical/Dexterous (300°, upper left) -->
    <line x1="0" y1="0" x2="-207.85" y2="-120" stroke="#374151" stroke-width="1.5"/>
    <text x="-225" y="-130" font-family="Arial, sans-serif" font-size="13" fill="#9ca3af" text-anchor="end" font-weight="500">
      Physical/Dexterous
    </text>
    
    <!-- AI Potential polygon (large) -->
    <polygon points="0,-220 190.53,-110 190.53,110 0,220 -190.53,110 -190.53,-110"
             fill="url(#potentialGrad)" 
             stroke="#f59e0b" 
             stroke-width="2.5"
             opacity="0.8"/>
    
    <!-- Current Use polygon (small) -->
    <polygon points="0,-75 64.95,-37.5 64.95,37.5 0,75 -64.95,37.5 -64.95,-37.5"
             fill="url(#currentGrad)" 
             stroke="#3b82f6" 
             stroke-width="2.5"
             opacity="0.9"/>
    
    <!-- Center dot -->
    <circle cx="0" cy="0" r="3" fill="#e5e7eb"/>
  </g>
  
  <!-- Legend -->
  <g transform="translate(580, 520)">
    <!-- AI's Potential -->
    <rect x="0" y="0" width="30" height="15" fill="url(#potentialGrad)" stroke="#f59e0b" stroke-width="1.5" opacity="0.8"/>
    <text x="38" y="12" font-family="Arial, sans-serif" font-size="13" fill="#e5e7eb">
      AI's Potential
    </text>
    
    <!-- Current Use -->
    <rect x="0" y="25" width="30" height="15" fill="url(#currentGrad)" stroke="#3b82f6" stroke-width="1.5" opacity="0.9"/>
    <text x="38" y="37" font-family="Arial, sans-serif" font-size="13" fill="#e5e7eb">
      Current AI Use
    </text>
  </g>
  
  <!-- Subtitle -->
  <text x="400" y="55" font-family="Arial, sans-serif" font-size="12" fill="#6b7280" text-anchor="middle" font-style="italic">
    Approximation of capability vs. usage across task categories
  </text>
</svg>
