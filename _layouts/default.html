<!DOCTYPE html>
<html lang="en">

{% include head.html %}

  <!-- Open Graph Meta Tags -->
  <meta property="og:title" content="Burke Holland" />
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://burkeholland.github.io/" />
  <meta property="og:image" content="https://pbs.twimg.com/profile_images/1876393154099740672/7iLAPmhD_400x400.jpg" />
  <meta property="og:description" content="Burke Holland" />

  <!-- Twitter Card Meta Tags -->
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="Burke Holland" />
  <meta name="twitter:description" content="Burke Holland" />
  <meta name="twitter:image" content="https://pbs.twimg.com/profile_images/1876393154099740672/7iLAPmhD_400x400.jpg" />

<body class="min-h-screen bg-gradient-to-br from-deep-purple to-deep-blue text-white overflow-x-hidden">
  <div class="relative max-w-7xl mx-auto lg:grid lg:grid-cols-[300px_1fr] min-h-screen w-full">
    <aside
      class="sticky top-0 w-full h-auto lg:h-screen z-50 bg-white/10 backdrop-blur border-b lg:border-r border-white/10 shrink-0">
      <div class="p-4 lg:p-8">
        <div class="relative flex items-center lg:block">
          <button class="lg:hidden absolute left-0 p-2 hover:bg-white/5 rounded" aria-label="Toggle menu">
            <span class="block w-6 h-0.5 bg-neon-cyan mb-1.5"></span>
            <span class="block w-6 h-0.5 bg-neon-cyan mb-1.5"></span>
            <span class="block w-6 h-0.5 bg-neon-cyan"></span>
          </button>
          <div class="flex flex-row lg:flex-col items-center gap-4 mx-auto lg:mx-0">
            <img src="https://pbs.twimg.com/profile_images/1876393154099740672/7iLAPmhD_400x400.jpg" alt="Profile Photo"
              class="w-16 h-16 lg:w-[150px] lg:h-[150px] rounded-full border-2 lg:border-3 border-neon-cyan shadow-[0_0_20px_rgba(121,242,230,0.3)] flex-shrink-0">
            <div class="text-center">
              <h1 class="text-lg lg:text-xl bg-gradient-to-r from-neon-pink to-neon-cyan bg-clip-text text-transparent">
                Burke Holland</h1>
              <p class="text-sm lg:text-base text-white/80">Hi! 👋</p>
            </div>
          </div>
        </div>
        <nav class="hidden lg:block mt-8 space-y-4" id="nav-menu">
          <a href="/"
            class="block px-4 py-2 text-neon-cyan hover:bg-white/5 rounded-lg transition-all lg:hover:translate-x-2">Blog</a>
          <a href="/about"
            class="block px-4 py-2 text-neon-cyan hover:bg-white/5 rounded-lg transition-all lg:hover:translate-x-2">About</a>
          <a href="/projects"
            class="block px-4 py-2 text-neon-cyan hover:bg-white/5 rounded-lg transition-all lg:hover:translate-x-2">Projects</a>
        </nav>
      </div>
    </aside>

    <main class="w-full min-w-0 p-4 lg:p-6 lg:col-start-2 lg:max-w-4xl mx-auto relative z-10">
      {{ content }}
    </main>
  </div>

  <script>
    const menuToggle = document.querySelector('button[aria-label="Toggle menu"]');
    const navMenu = document.getElementById('nav-menu');

    menuToggle?.addEventListener('click', () => {
      navMenu.classList.toggle('hidden');
      menuToggle.setAttribute(
        'aria-expanded',
        menuToggle.getAttribute('aria-expanded') === 'true' ? 'false' : 'true'
      );
    });
  </script>
</body>

</html>
</html>
