<!DOCTYPE html>
<html lang="en">

{% include head.html %}

<body class="min-h-screen">
  
  <div class="min-h-screen">
    
    <!-- Header -->
    <header class="bg-secondary border-b border-custom">
      <div class="max-w-4xl mx-auto px-6 py-12">
        <div class="flex flex-col md:flex-row items-center gap-8">
          
          <div class="relative">
            <div class="absolute inset-0 rounded-full" style="background: var(--accent); opacity: 0.2; filter: blur(20px);"></div>
            <a href="/">
              <img 
                src="https://pbs.twimg.com/profile_images/1876393154099740672/7iLAPmhD_400x400.jpg" 
                alt="Burke Holland" 
                class="relative w-28 h-28 rounded-full border-4 border-custom"
              >
            </a>
          </div>
          
          <div class="flex-1 text-center md:text-left">
            <h1 class="font-serif text-5xl font-bold mb-3">
              <a href="/" class="hover-accent transition-colors">Burke Holland</a>
            </h1>
            <p class="text-secondary text-lg font-sans mb-6">
              Writing about code from the woods of Nashville
            </p>
            
            <nav class="flex flex-wrap justify-center md:justify-start gap-1 font-sans text-sm font-bold">
              <a href="/" class="px-4 py-2 accent-bg text-white rounded">Blog</a>
              <a href="/about" class="px-4 py-2 hover-accent transition-colors rounded">About</a>
              <a href="/projects" class="px-4 py-2 hover-accent transition-colors rounded">Projects</a>
            </nav>
          </div>
          
        </div>
      </div>
    </header>

    <!-- Main Content -->
    <main class="max-w-4xl mx-auto px-6 py-16">
      {{ content }}
    </main>
    
    <!-- Footer -->
    <footer class="bg-secondary border-t border-custom mt-16">
      <div class="max-w-4xl mx-auto px-6 py-10">
        <div class="flex flex-col md:flex-row justify-between items-center gap-6">
          
          <div class="text-center md:text-left">
            <p class="text-muted font-sans text-sm mb-2">© 2026 Burke Holland</p>
            <p class="text-muted font-sans text-xs">Built with care in Nashville</p>
          </div>
          
          <div class="flex gap-6">
            <a href="https://twitter.com/burkeholland" class="text-muted hover-accent transition-colors" aria-label="Twitter">
              <svg class="w-5 h-5" fill="currentColor" viewBox="0 0 24 24">
                <path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-5.214-6.817L4.99 21.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231zm-1.161 17.52h1.833L7.084 4.126H5.117z"/>
              </svg>

          </div>
          
        </div>
      </div>
    </footer>
    
  </div>
</body>

</html>
