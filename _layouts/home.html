---
layout: default
---

<div class="w-full">
  <div class="space-y-8">
    {% for post in paginator.posts %}
    <article class="bg-white/10 border border-white/10 rounded-2xl p-8 transition-transform hover:-translate-y-1">
      <a href="{{ post.url }}" class="block">
        <h2 class="text-2xl text-neon-cyan mb-4 transition-colors hover:text-neon-pink">{{ post.title | strip_html }}
        </h2>
        <p class="text-neon-cyan mb-4">{{ post.date | date: "%B %d, %Y" }}</p>
        <p class="text-white/90 leading-relaxed">{{ post.content | markdownify | strip_html | truncatewords: 50 }}</p>
      </a>
    </article>
    {% endfor %}
  </div>

  {% include pagination.html %}
</div>
