---
layout: default
---

<article class="frost-card rounded-lg p-8 lg:p-12 w-full">
  <header class="text-center mb-10">
    <time class="text-sm font-mono text-muted tracking-wide uppercase">{{ page.date | date: "%B %d, %Y" }}</time>
    <h1 class="mt-4 font-serif text-4xl lg:text-5xl font-bold leading-tight">{{ page.title }}</h1>
  </header>

  <div class="prose prose-lg max-w-none lg:prose-xl
              prose-headings:font-serif prose-headings:font-semibold
              prose-p:leading-relaxed prose-p:font-sans
              prose-a:accent prose-a:no-underline hover:prose-a:underline prose-a:break-words
              prose-blockquote:italic prose-blockquote:font-serif prose-blockquote:text-xl
              prose-code:text-sm prose-code:break-words prose-code:font-mono
              prose-pre:overflow-x-auto prose-pre:max-w-full prose-pre:rounded-xl
              prose-img:rounded-lg prose-img:max-w-full prose-img:h-auto
              overflow-hidden">
    {{ content }}
  </div>
</article>
