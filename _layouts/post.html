---
layout: default
---

<div class="post-article-wrap">
  <a href="/" class="post-article-back">← All posts</a>
  <div class="post-article-meta">
    <span class="gradient-border-pill gradient-border-pill-bg"><span class="gradient-text">ARTICLE</span></span>
    <h1 class="post-article-title">{{ page.title }}</h1>
    <div class="post-article-date">{{ page.date | date: "%B %-d, %Y" }}</div>
  </div>
  <div class="prose prose-lg max-w-none">
    {{ content }}
  </div>
  <div class="post-footer-nav">
    <a href="/" class="post-article-back">← All posts</a>
  </div>
</div>
