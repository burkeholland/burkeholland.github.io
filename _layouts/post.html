---
layout: default
---

<article class="post-content">
  <header>
    <time class="post-meta">{{ page.date | date: "%B %d, %Y" }}</time>
    <h1>{{ page.title }}</h1>
    <div class="post-meta">By Burke Holland · {{ page.content | number_of_words | divided_by: 200 | at_least: 1 }} minute read</div>
  </header>

  <div class="post-body">
    {{ content }}
  </div>
</article>
